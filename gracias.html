<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias — Joscelina Bersezio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #5c1630;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 520px;
    }
    .icon { font-size: 3rem; margin-bottom: 24px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      margin-bottom: 16px;
    }
    p { color: rgba(255,255,255,0.75); font-size: 1rem; line-height: 1.7; margin-bottom: 12px; }
    a {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 32px;
      background: #fff;
      color: #5c1630;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✉️</div>
    <h1>¡Gracias por escribir!</h1>
    <p>Recibí tu consulta. Me voy a comunicar con vos a la brevedad para coordinar.</p>
    <p>Si necesitás una respuesta más rápida, podés escribirme por WhatsApp al <strong>264 567-6252</strong>.</p>
    <a href="index.html">← Volver al inicio</a>
  </div>
</body>
</html>
